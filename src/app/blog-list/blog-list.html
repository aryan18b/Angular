<h2>Blog Posts</h2>
<!-- <input class="search-input" type="text" placeholder="Search posts" [value]="searchText" (input)="searchText = $event.target.value"> -->
<input class="search-input" type="text" placeholder="Search posts" [(ngModel)]="searchText">

@if (posts$ | async; as posts) {

    <div class="post-list">
        @for (post of filterPosts(posts); track $index) {
            <app-blog-card [title]="post.title" [body]="post.body"></app-blog-card>
        }
    </div>   
}
