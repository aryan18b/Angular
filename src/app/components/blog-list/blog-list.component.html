<h2>Blog Posts</h2>

<input class="search-input" type="text" placeholder="Search posts" [(ngModel)]="searchText">

<p *ngIf="loading$ | async">Loading blogs...</p>

<p *ngIf="error$ | async as error">Error in loading blogs : {{error}} </p>

<div *ngIf="blogs$ | async as blogList">

    <button (click)="togglePosts()">
        {{ showPosts ? 'Hide' : 'Show' }} Posts
    </button>
    
    <div *ngIf="showPosts">
        <div class="post-list">
            <app-blog-card *ngFor="let blog of blogList" [title]="blog.title" [body]="blog.body" [routerLink]="['/posts', blog._id]" routerLinkActive="router-link-active" ></app-blog-card>
        </div>   
    </div>
</div>
